name: chocolatine

on:
  push:
  pull_request:

jobs:
  build:
    if: |
      github.event_name == 'push'
      && !startsWith(github.ref, 'refs/heads/no-ga/')
      && github.repository != 'mirror/repo'
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker

    steps:
      - uses: actions/checkout@v4

      - name: Check Repo with banana
        run: banana-check-repo . || true

      - name: Check Repo with banana
        run: |
          set +e
          banana-check-repo . > errors.txt
          EXIT_CODE=$?
          make >> errors.txt 2>&1
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            while IFS= read -r line; do
              echo "$line"
            done < errors.txt
          fi

      - name: Compile it
        run: make
        timeout-minutes: 2

      - name: Clean
        run: make clean
