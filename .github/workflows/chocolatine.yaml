name: chocolatine

on:
  push:
  pull_request:

jobs:
  check_compilation_and_coding_style:
    if: |
      !startsWith(github.ref, 'refs/heads/no-ga/')
      && github.repository != 'mirror/repo'
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker

    steps:
      - uses: actions/checkout@v4

      - name: Check Repo with banana
        run: banana-check-repo .

      - name: Compile
        run: |
          make CC=epiclang > errors.txt 2>&1
        timeout-minutes: 2

      - name: Check coding style
        run: |
          grep "\[Banana\]" errors.txt | while IFS= read -r line; do
            file=$(echo "$line" | cut -d':' -f1)
            line_num=$(echo "$line" | cut -d':' -f2)
            message=$(echo "$line" | sed 's/.*] //' | sed 's/ (C-[A-Z0-9]*)//')
            type=$(echo "$line" | grep -o "\[Minor\]\|\[Major\]\|\[Info\]" | tr -d '[]')
            code=$(echo "$line" | grep -o "C-[A-Z0-9]*")
            echo "::error file=$file,line=$line_num,title=$type coding style error::$code - $message"
            EXIT=1
          done
          if [ $EXIT -eq 1 ]; then
            exit 1
          fi
          make fclean

      - name: Clean
        run: make clean

      - name: Executables
        run: |
          IFS=',' read -ra files <<< "${{ vars.EXECUTABLES }}"

          echo "$EXECUTABLES" | tr ',' '\n' | while read file; do
            if [ ! -f "$file" ] || [ ! -x "$file" ]; then
              echo "::error file=$file::$file not found or not executable"
              exit 1
            fi
          done

  run_tests:
    needs: check_compilation_and_coding_style
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker

    steps:
      - uses: actions/checkout@v4

      - name: Launch tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    needs: run_tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clean all the repo
        run: make fclean
      - name: Push to mirror
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ vars.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
