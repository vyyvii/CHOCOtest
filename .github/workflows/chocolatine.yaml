name: chocolatine

on:
  push:
  pull_request:

jobs:
  check_compilation_and_coding_style:
    if: |
      github.event_name == 'push'
      && !startsWith(github.ref, 'refs/heads/no-ga/')
      && github.repository != 'mirror/repo'
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker

    steps:
      - uses: actions/checkout@v4

      - name: Check Repo with banana
        run: banana-check-repo . || true

      - name: Compile it
        run: make
        timeout-minutes: 2

      - name: Check coding style
        run: |
          make fclean
          set +e
          banana-check-repo . > errors.txt
          EXIT_CODE=$?
          make >> errors.txt 2>&1
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            grep "\[Banana\]" errors.txt | while IFS= read -r line; do
              file=$(echo "$line" | cut -d':' -f1')
              line_num=$(echo "$line" | cut -d':' -f2)
              message=$(echo "$line" | sed 's/.*\[Banana\] //')
              echo "::error file=$file,line=$line_num::$message"
            done < errors.txt
          fi

      - name: Clean
        run: make clean