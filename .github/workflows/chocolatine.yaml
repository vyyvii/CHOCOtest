name: chocolatine

on:
  push:
  pull_request:

env:
  EXECUTABLES: mysh
  MIRROR_SSH_URL: git@github.com:vyyvii/mirror_chocolatine.git
  CC: epiclang

jobs:
  check_compilation_and_coding_style:
    if: |
      !startsWith(github.ref, 'refs/heads/no-ga/')
      && github.repository != 'vyyvii/mirror_chocolatine'
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker

    steps:
      - uses: actions/checkout@v4

      - name: Check Repo with banana
        run: |
          EXIT=0

          set +e
          banana-check-repo . > errors.txt
          set -e

          grep "\[Banana\]" errors.txt > banana_errors.txt
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d':' -f1)
            message=$(echo "$line" | sed 's/.*] //' | sed 's/ (C-[A-Z0-9]*)//')
            type=$(echo "$line" | grep -o "\[Fatal\]\|\[Minor\]\|\[Major\]\|\[Info\]" | tr -d '[]')
            code=$(echo "$line" | grep -o "C-[A-Z0-9]*")
            echo "::error file=$file,title=$type coding style error::$code - $message"
            EXIT=1
          done < banana_errors.txt

          if [ $EXIT -eq 1]; then
            exit 1
          fi
          exit 0

      - name: Compile
        run: |
          make CC=epiclang > errors.txt 2>&1
        timeout-minutes: 2

      - name: Check coding style
        run: |
          grep "\[Banana\]" errors.txt > banana_errors.txt
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d':' -f1)
            line_num=$(echo "$line" | cut -d':' -f2)
            message=$(echo "$line" | sed 's/.*] //' | sed 's/ (C-[A-Z0-9]*)//')
            type=$(echo "$line" | grep -o "\[Fatal\]\|\[Minor\]\|\[Major\]\|\[Info\]" | tr -d '[]')
            code=$(echo "$line" | grep -o "C-[A-Z0-9]*")
            echo "::error file=$file,line=$line_num,title=$type coding style error::$code - $message"
          done < banana_errors.txt

          if grep "\[Banana\]" errors.txt; then
            exit 1
          fi
          exit 0

      - name: Clean
        run: make clean

      - name: Executables
        run: |
          EXIT=0

          echo "$EXECUTABLES" | tr ',' '\n' > exec_list.txt
          while IFS= read -r file; do
            if [ ! -f "$file" ]; then
              echo "::error file=$file::$file not found"
              EXIT=1
            fi
            if [ ! -x "$file" ]; then
              echo "::error file=$file::$file not executable"
              EXIT=1
            fi
          done < exec_list.txt

          if [ $EXIT -eq 1 ]; then
            exit 1
          fi
          exit 0

  run_tests:
    needs: check_compilation_and_coding_style
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker

    steps:
      - uses: actions/checkout@v4

      - name: Launch tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    needs: run_tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean all the repo
        run: make fclean ; ls -R
      - name: Push to mirror
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
